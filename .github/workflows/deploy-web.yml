name: Build and Deploy Web Game

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write
  security-events: write

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: false

jobs:
  sast:
    name: SAST CodeQL
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: python

      - name: Analyze with CodeQL
        uses: github/codeql-action/analyze@v3

  sonarqube:
    name: SonarQube Analysis
    runs-on: [self-hosted, macOS, X64]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify SonarQube connectivity
        run: |
          curl -I "${{ secrets.SONAR_HOST_URL }}"

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v8.0.0
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

      - name: SonarQube Quality Gate
        uses: sonarsource/sonarqube-quality-gate-action@v1.2.0
        with:
          pollingTimeoutSec: 600
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

  build:
    name: Build Pygbag
    runs-on: ubuntu-latest
    needs: [sast, sonarqube]
    if: always() && needs.sast.result == 'success' && (needs.sonarqube.result == 'success' || needs.sonarqube.result == 'skipped')

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install web build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-web.txt

      - name: Validate Python files
        run: |
          python -m py_compile main.py sound_manager.py

      - name: Build web package
        run: |
          pygbag --build --template tools/pygbag/default.tmpl .

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/web

  deploy:
    name: Deploy GitHub Pages
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
